# servers.yaml
servers:
  # Local stdio-based servers
  remote:
  
    - name: "remote_test_server_web_search"
      command: "npx"
      #args: ["mcp-remote", "http://0.0.0.0:8001/mcp", "--allow-http"]
      #args: ["mcp-remote", "https://faith-hope-love.fastmcp.app/mcp"]
      args: ["mcp-remote", "https://faith-hope-love.fastmcp.app/mcp", "8471", "localhost"]
      #env:
      #  FILE_IO_BASE_DIR: "/home/erangadesaram/Downloads"  # optional
      transport: "streamable-http"
      oauth:
        redirectUri: "https://mcp-st-client-test.onrender.com"
    
    - name: "open_web_search"
      command: "npx"
      args: ["open-websearch@latest"]
      env:
        MODE: "stdio"                     # Force stdio mode
        DEFAULT_SEARCH_ENGINE: "brave"   # or bing, exa, brave, duckduckgo        
        ALLOWED_SEARCH_ENGINES: "brave,duckduckgo,exa"
      transport: "stdio"